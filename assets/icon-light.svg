<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- Cute robot face for OCLite sidebar -->
  <!-- Head outline -->
  <rect x="4" y="3" width="16" height="14" rx="4" fill="#a78bfa" opacity="0.9"/>
  <!-- Face plate -->
  <rect x="6" y="5" width="12" height="10" rx="3" fill="#e0d4fd"/>
  <!-- Left eye -->
  <circle cx="9.5" cy="10" r="1.8" fill="#312e81"/>
  <circle cx="10" cy="9.5" r="0.5" fill="white"/>
  <!-- Right eye -->
  <circle cx="14.5" cy="10" r="1.8" fill="#312e81"/>
  <circle cx="15" cy="9.5" r="0.5" fill="white"/>
  <!-- Smile -->
  <path d="M9.5 12.5 Q12 14.5 14.5 12.5" stroke="#312e81" stroke-width="0.8" fill="none" stroke-linecap="round"/>
  <!-- Antenna -->
  <line x1="12" y1="3" x2="12" y2="1" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
  <circle cx="12" cy="0.5" r="1" fill="#c4b5fd"/>
  <!-- Paintbrush -->
  <line x1="18" y1="18" x2="21" y2="21" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M17 17 L19 15 L20 16 L18 18 Z" fill="#818cf8"/>
  <!-- Sparkle -->
  <path d="M20 5 L20.5 6.5 L22 7 L20.5 7.5 L20 9 L19.5 7.5 L18 7 L19.5 6.5 Z" fill="#fbbf24" opacity="0.8"/>
  <circle cx="3" cy="20" r="0.8" fill="#818cf8" opacity="0.5"/>
</svg>
